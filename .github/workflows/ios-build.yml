name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Show build info
        run: |
          xcodebuild -version
          swift --version
          echo "--- Installed runtimes ---"
          xcrun simctl runtime list 2>/dev/null || echo "no runtimes"

      - name: Install iOS SDK
        run: |
          xcodebuild -downloadPlatform iOS -quiet || \
            echo "::warning::xcodebuild download failed, trying xcodes"
          ls /Applications/Xcode_16.2.app/Contents/Developer/Platforms/iPhoneOS.platform/DeviceSupport/ 2>/dev/null || true

      - name: List available Xcodes
        run: |
          echo "--- Available Xcodes ---"
          ls /Applications/ | grep -i xcode || echo "default Xcode only"
          echo "--- xcodebuild -showsdks ---"
          xcodebuild -showsdks 2>&1 || true

      - name: Build (simulator)
        run: |
          xcodebuild build \
            -project ShadowBrokerIOS.xcodeproj \
            -scheme ShadowBrokerIOS \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SWIFT_OPTIMIZATION_LEVEL="-Onone" \
            GCC_OPTIMIZATION_LEVEL=0
        timeout-minutes: 10

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ShadowBrokerIOS
          path: ~/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
